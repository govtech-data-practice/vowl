kind: DataContract
apiVersion: v3.0.2
version: 1.0.0
status: active
id: hdb-resale-contract
description:
  purpose: Data quality contract for Singapore HDB resale transactions
  limitations: Based on public transaction records
  usage: Validate HDB resale flat transaction data

schema:
  - name: hdb_resale_prices
    description: HDB Resale Prices Dataset
    properties:
      - name: month
        logicalType: string
        physicalType: varchar
        description: Month (YYYY-MM)
        quality:
          - type: sql
            name: "Month Format Check"
            description: "Month should be in YYYY-MM format"
            query: "SELECT COUNT(*) FROM hdb_resale_prices WHERE month NOT LIKE '____-__'"
            mustBe: 0
            dimension: "conformity"

      - name: flat_type
        logicalType: string
        physicalType: varchar
        description: Flat Type
        quality:
          - type: sql
            name: "flat_type_enum"
            description: "Flat Type should be one of the allowed values"
            query: "SELECT COUNT(*) FROM hdb_resale_prices WHERE flat_type NOT IN ('1 ROOM', '2 ROOM', '3 ROOM', '4 ROOM', '5 ROOM', 'EXECUTIVE', 'MULTI-GENERATION')"
            mustBe: 0

      - name: resale_price
        logicalType: number
        physicalType: decimal
        description: Resale Price
        quality:
          - type: sql
            name: "resale_price_positive"
            description: "Resale price should be positive"
            query: "SELECT COUNT(*) FROM hdb_resale_prices WHERE resale_price <= 0"
            mustBe: 0

      - name: town
        logicalType: string
        physicalType: varchar
        description: Town
        quality:
          - type: sql
            name: "town_not_null"
            description: "Town should not be null"
            query: "SELECT COUNT(*) FROM hdb_resale_prices WHERE town IS NULL"
            mustBe: 0

      - name: floor_area_sqm
        logicalType: number
        physicalType: decimal
        description: Floor Area in Square Meters
        quality:
          - type: sql
            name: "floor_area_reasonable"
            description: "Floor area should be between 20-400 sqm (allows for large executive units)"
            query: "SELECT COUNT(*) FROM hdb_resale_prices WHERE floor_area_sqm < 20 OR floor_area_sqm > 400"
            mustBe: 0

    quality:
      - type: sql
        name: "no_null_resale_prices"
        description: "Resale price should not be null"
        query: "SELECT COUNT(*) FROM hdb_resale_prices WHERE resale_price IS NULL"
        mustBe: 0
        dimension: "completeness"

