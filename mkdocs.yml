site_name: ODCS Data Contract Validation Engine
site_description: >-
  vowl is a validation engine for Open Data Contract Standard (ODCS) data contracts.
  Define validation rules once in declarative YAML and get rich, actionable reports
  on data quality across pandas, Polars, PySpark, and 20+ Ibis backends.
site_url: https://govtech-data-practice.github.io/vowl/
repo_url: https://github.com/govtech-data-practice/vowl
repo_name: govtech-data-practice/vowl

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/govtech-data-practice/vowl

theme:
  name: material
  custom_dir: docs/overrides
  logo: img/vowl_logo.png
  favicon: img/vowl_logo.png
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Data Contracts: contracts.md
  - Usage Patterns: usage-patterns.md
  - Architecture: architecture.md
  - Known Issues: known-issues.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - meta
