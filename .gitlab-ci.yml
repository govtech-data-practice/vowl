include:
  - template: Jobs/Secret-Detection.latest.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml

stages:
  - test
  - deploy

default:
  image: python:3.12

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"

cache:
  key: "${CI_JOB_IMAGE}"
  paths:
    - .cache/uv/
    - .venv/

test:
  stage: test
  before_script:
    - python -m pip install --upgrade pip uv
    - export UV="python -m uv"
    - ${UV} sync --group lean-ci-test
  script:
    - .venv/bin/python -m pytest -m "not docker_integration" tests/

publish_package:
  stage: deploy
  variables:
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
    - when: never
  before_script:
    - python -m pip install --upgrade pip uv
    - export UV="python -m uv"
    - ${UV} sync
  script:
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        git fetch origin "${CI_DEFAULT_BRANCH}"
        git merge-base --is-ancestor "${CI_COMMIT_SHA}" "origin/${CI_DEFAULT_BRANCH}" || {
          echo "Refusing to publish tag ${CI_COMMIT_TAG}: commit is not on ${CI_DEFAULT_BRANCH}."
          exit 1
        }
      fi
    - make release-check
    - |
      export TWINE_USERNAME="gitlab-ci-token"
      export TWINE_PASSWORD="${CI_JOB_TOKEN}"
      export TWINE_REPOSITORY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi"
      .venv/bin/python -m twine upload --skip-existing dist/*
