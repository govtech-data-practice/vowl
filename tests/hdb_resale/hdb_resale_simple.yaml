kind: DataContract
apiVersion: v3.1.0
version: 1.0.0
id: c11443ee-542f-4442-b28d-2d224342be37
status: draft
name: HDB Resale Flat Prices
domain: real-estate
description:
  purpose: >-
    This dataset provides comprehensive HDB resale flat transaction records in
    Singapore from January 2017 onwards, enabling market analysis, price trend
    monitoring, and informed decision-making for property buyers, sellers, real
    estate professionals, and policy makers. It serves as the authoritative
    source for understanding Singapore's public housing resale market dynamics.
  usage: >-
    Consumers can analyze resale price trends by town, flat type, floor area,
    and storey range to assess market valuations. The data supports comparative
    market analysis for property valuation, research on housing affordability,
    and development of pricing models. Access is available via CSV download or
    REST API queries using the dataset ID for programmatic integration.
  limitations: >-
    Resale prices are indicative only as actual transaction values depend on
    multiple factors including flat condition and buyer-seller negotiations. The
    dataset excludes transactions that may not reflect full market prices, such
    as sales between relatives or partial share transfers. A business rule
    constraint requires resale prices not to exceed 2 million SGD for data
    quality purposes.
schema:
  - name: hdb_resale_prices
    description: >-
      Contains historical resale transaction data for Housing Development Board
      (HDB) flats in Singapore, including property details, location, and sale
      prices
    businessName: HDB Resale Flat Transactions
    dataGranularityDescription: >-
      One record per individual HDB flat resale transaction, identified by the
      combination of month, block, street name, and flat details
    properties:
      - name: month
        description: The year and month of the HDB resale transaction in YYYY-MM format
        logicalType: string
        examples:
          - 2017-01
        quality:
          - type: sql
            name: Month
            description: Based on ISO 8601, assumed to be in UTC +8 | YYYY-MM
            mustBe: 0
            query: |-
              SELECT COUNT(*)
              FROM "hdb_resale_prices"
              WHERE CAST(month AS TEXT) !~ '^[0-9]{4}-(0[1-9]|1[0-2])$';
            tags:
              - SG-DRM v5.0
            dimension: conformity
      - name: town
        description: >-
          The town or estate location where the HDB flat is situated in
          Singapore
        examples:
          - ANG MO KIO
        quality:
          - type: library
            metric: nullValues
            mustBe: 0
            dimension: completeness
      - name: flat_type
        description: >-
          The type of HDB flat based on the number of rooms, indicating the size
          category of the residential unit
        examples:
          - 2 ROOM
          - 3 ROOM
        quality:
          - type: library
            metric: invalidValues
            mustBe: 0
            dimension: conformity
            arguments:
              validValues:
                - 1 ROOM
                - 2 ROOM
                - 3 ROOM
                - 4 ROOM
                - 5 ROOM
                - EXECUTIVE
                - MULTI-GENERATION
      - name: block
        description: The block number of the HDB building where the resale flat is located
        examples:
          - '406'
          - '108'
          - '602'
        quality:
          - type: sql
            name: AddressBlockHouseNumber
            description: >-
              House number component of a street address | Alphanumeric up to 10
              characters (e.g. 12, 535, 358C)
            mustBe: 0
            query: |-
              SELECT COUNT(*)
              FROM "hdb_resale_prices"
              WHERE CAST(block AS TEXT) !~ '^[A-Za-z0-9]{1,10}$';
            tags:
              - SG-DRM v5.0
            dimension: conformity
      - name: street_name
        description: >-
          The street name where the HDB flat is located, typically including the
          area name and avenue/street number
        examples:
          - ANG MO KIO AVE 10
          - ANG MO KIO AVE 4
          - ANG MO KIO AVE 5
      - name: storey_range
        description: >-
          The range of floor levels (storeys) where the HDB flat unit is
          located, expressed as a range from lower to upper floor numbers
        examples:
          - 10 TO 12
          - 01 TO 03
          - 04 TO 06
      - name: floor_area_sqm
        description: The floor area of the HDB flat in square meters
        examples:
          - '44'
          - '67.2'
          - '68'
        quality:
          - name: floor_area_must_be_less_than_200
            description: Validates that floor area must be less than 200
            type: sql
            dimension: consistency
            severity: error
            query: SELECT COUNT(*) FROM "hdb_resale_prices" WHERE floor_area_sqm >= 200
            mustBe: 0
            tags:
              - User-Defined Quality Rule
      - name: flat_model
        description: >-
          The model or design type of the HDB flat, indicating the architectural
          style and layout configuration
        examples:
          - Improved
          - New Generation
      - name: lease_commence_date
        description: >-
          The year when the lease of the HDB flat commenced, indicating when the
          99-year lease period began
        examples:
          - '1979'
          - '1978'
          - '1980'
        quality:
          - type: sql
            name: Year
            description: Based on ISO 8601, assumed to be in UTC +8 | YYYY
            mustBe: 0
            query: |-
              SELECT COUNT(*)
              FROM "hdb_resale_prices"
              WHERE CAST(lease_commence_date AS TEXT) !~ '^[0-9]{4}$';
            tags:
              - SG-DRM v5.0
            dimension: conformity
      - name: remaining_lease
        description: >-
          The remaining lease duration for the HDB flat, expressed in years and
          months
        examples:
          - 61 years 01 month
          - 60 years 07 months
          - 62 years 05 months
      - name: resale_price
        description: The transaction price of the HDB flat resale in Singapore dollars
        examples:
          - '232000'
          - '250000.88'
          - '262000'
        quality:
          - name: resale_price_must_not_exceed_2m
            description: Resale price must not be more than 2 million SGD
            type: sql
            dimension: conformity
            severity: error
            query: >-
              SELECT COUNT(*) FROM "hdb_resale_prices" WHERE resale_price >
              2000000
            mustBe: 0
            tags:
              - Business Metadata Enrichment
    quality:
      - type: library
        metric: rowCount
        mustBeBetween: 
          - 0
          - 30000000
        dimension: completeness
